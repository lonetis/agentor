services:
  orchestrator:
    image: node:22-alpine
    command: sh -c "npm install && npx nuxt dev --host 0.0.0.0"
    container_name: agentor-orchestrator
    working_dir: /app
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - agentor-net
    volumes:
      - ./orchestrator:/app
      - agentor-orchestrator-node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - agentor-data:/data
      - ./.cred:/cred
    environment:
      - DATA_VOLUME=agentor-data
    env_file: .env

volumes:
  agentor-orchestrator-node_modules:
  agentor-data:

networks:
  agentor-net:
    name: agentor-net
    driver: bridge
