services:
  orchestrator:
    image: ghcr.io/lonetis/agentor-orchestrator:latest
    restart: unless-stopped
    container_name: agentor-orchestrator
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - agentor-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Storage mode is auto-detected from the mount type:
      #   Directory mode (host bind mount):   ./data:/data   (default)
      #   Volume mode (Docker named volume):  agentor-data:/data
      - ./data:/data
    environment:
      - WORKER_IMAGE_PREFIX=ghcr.io/lonetis/
    env_file: .env

networks:
  agentor-net:
    name: agentor-net
    driver: bridge
